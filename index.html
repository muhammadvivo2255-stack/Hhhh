<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiroNime</title>

<style>
body{margin:0;background:#0d0d0d;color:white;font-family:sans-serif}
.header{padding:15px;font-size:20px;background:#111}
.search{margin:10px;padding:10px;width:90%;border-radius:8px;border:none}
.card{background:#1e1e1e;margin:10px;padding:15px;border-radius:10px}
.btn{background:#ff2e63;padding:8px;border-radius:8px;margin-top:8px;text-align:center}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.nav div{flex:1;text-align:center;padding:10px}
.hidden{display:none}
img{width:100%;border-radius:10px}

/* SIDEBAR */
#sidebar{
 position:fixed;
 left:-250px;
 top:0;
 width:250px;
 height:100%;
 background:#111;
 padding:20px;
 transition:0.3s;
 z-index:999;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h2>🔥 HiroNime</h2>
  <p onclick="show('home')">🏠 Home</p>
  <p onclick="showFav()">❤️ Favorit</p>
  <p onclick="show('profile')">👤 Profile</p>
  <p onclick="premium()">👑 Premium</p>
</div>

<!-- HEADER -->
<div class="header" onclick="toggleMenu()">☰ HiroNime</div>

<!-- LOGIN -->
<div id="login">
<input id="u" type="email" placeholder="Email"><br><br>
<input id="p" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<input class="search" placeholder="Cari anime..." onkeyup="searchAnime(this.value)">

<div id="home"></div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h2>👤 Admin Hiro</h2>
<p>Status: Premium 😎</p>
</div>

<!-- NAVBAR -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="showFav()">❤️</div>
<div onclick="show('profile')">👤</div>
</div>

</div>

<script>

/* LOGIN */
function login(){
 let email = document.getElementById("u").value;
 let pass = document.getElementById("p").value;

 if(email === "Ruruwanggy@gmail.com" && pass === "ruru"){
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.remove("hidden");
 } else {
  alert("Login gagal");
 }
}

/* SIDEBAR */
function toggleMenu(){
 let s = document.getElementById("sidebar");
 s.style.left = (s.style.left === "0px") ? "-250px" : "0px";
}

/* PREMIUM */
function premium(){
 alert("🔥 Premium aktif!\nStreaming tanpa iklan 😎");
}

/* FAVORIT */
function fav(name){
 let f = JSON.parse(localStorage.getItem("fav")||"[]");
 f.push(name);
 localStorage.setItem("fav", JSON.stringify(f));
 alert("Ditambah ke favorit");
}

function showFav(){
 let f = JSON.parse(localStorage.getItem("fav")||"[]");
 alert("Favorit: "+f.join(", "));
}

/* SEARCH */
function searchAnime(q){
 let cards = document.querySelectorAll(".card");
 cards.forEach(c=>{
  if(c.innerText.toLowerCase().includes(q.toLowerCase())){
    c.style.display="block";
  }else{
    c.style.display="none";
  }
 });
}

/* WATCH */
function watch(name){
 alert("🎬 Memutar "+name);
}

/* AUTO GENERATE ANIME */
let home = document.getElementById("home");

for(let i=1;i<=50;i++){
 let div = document.createElement("div");
 div.className="card";
 div.innerHTML = `
  <img src="https://picsum.photos/40${i}/200">
  <h3>Anime Episode ${i}</h3>
  <div class="btn" onclick="watch('Anime Episode ${i}')">🎬 Tonton</div>
  <div class="btn" onclick="fav('Anime ${i}')">❤️ Favorit</div>
 `;
 home.appendChild(div);
}

/* NAV */
function show(page){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("profile").classList.add("hidden");
 document.getElementById(page).classList.remove("hidden");
}

</script>

</body>
</html>
