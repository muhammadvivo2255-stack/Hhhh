<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiroNime</title>

<style>
body{margin:0;background:#0d0d0d;color:white;font-family:sans-serif}
.header{padding:15px;font-size:20px;font-weight:bold}
.search{margin:10px;padding:10px;width:90%;border-radius:8px;border:none}
.card{background:#1e1e1e;margin:10px;padding:15px;border-radius:10px}
.btn{background:#ff2e63;padding:8px;border-radius:8px;margin-top:8px;text-align:center}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.nav div{flex:1;text-align:center;padding:10px}
.hidden{display:none}
img{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="header">🔥 HiroNime</div>

<!-- LOGIN -->
<div id="login">
<input id="u" type="email" placeholder="Email"><br><br>
<input id="p" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<input class="search" placeholder="Search anime..." onkeyup="searchAnime(this.value)">

<div id="home">

<div class="card" data-name="rezero">
<img src="https://picsum.photos/400/200">
<h3 onclick="detail('Re:Zero','Anime isekai sedih')">Re:Zero</h3>
<div class="btn" onclick="fav('Re:Zero')">❤️ Favorit</div>
</div>

<div class="card" data-name="aot">
<img src="https://picsum.photos/401/200">
<h3 onclick="detail('Attack on Titan','Anime perang brutal')">Attack on Titan</h3>
<div class="btn" onclick="fav('AOT')">❤️ Favorit</div>
</div>

<div class="card" data-name="kimetsu">
<img src="https://picsum.photos/402/200">
<h3 onclick="detail('Demon Slayer','Anime action keren')">Demon Slayer</h3>
<div class="btn" onclick="fav('Kimetsu')">❤️ Favorit</div>
</div>

</div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<h2 id="dTitle"></h2>
<p id="dDesc"></p>
<div class="btn" onclick="back()">⬅️ Kembali</div>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h2>👤 Admin Hiro</h2>
<p>Status: Premium 😎</p>
</div>

<!-- NAVBAR -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="showFav()">❤️</div>
<div onclick="show('profile')">👤</div>
</div>

</div>

<script>
function login(){
 let email = document.getElementById("u").value;
 let pass = document.getElementById("p").value;

 if(email === "Ruruwanggy@gmail.com" && pass === "ruru"){
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.remove("hidden");
 } else {
  alert("Login gagal");
 }
}

function detail(t,d){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("detail").classList.remove("hidden");
 document.getElementById("dTitle").innerText=t;
 document.getElementById("dDesc").innerText=d;
}

function back(){
 document.getElementById("detail").classList.add("hidden");
 document.getElementById("home").classList.remove("hidden");
}

function fav(name){
 let f = JSON.parse(localStorage.getItem("fav")||"[]");
 f.push(name);
 localStorage.setItem("fav", JSON.stringify(f));
 alert("Ditambah ke favorit");
}

function show(page){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("profile").classList.add("hidden");
 document.getElementById("detail").classList.add("hidden");
 document.getElementById(page).classList.remove("hidden");
}

function showFav(){
 let f = JSON.parse(localStorage.getItem("fav")||"[]");
 alert("Favorit: "+f.join(", "));
}

function searchAnime(q){
 let cards = document.querySelectorAll(".card");
 cards.forEach(c=>{
  if(c.dataset.name.includes(q.toLowerCase())){
    c.style.display="block";
  }else{
    c.style.display="none";
  }
 });
}
</script>

</body>
</html>
