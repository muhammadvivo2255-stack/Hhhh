<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HiroNime PRO</title>

<style>
body{margin:0;background:#0d0d0d;color:white;font-family:sans-serif}

/* HEADER */
.header{padding:15px;font-size:20px;font-weight:bold}

/* LOGIN */
#login{
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 height:100vh;
}
#login input{
 width:80%;
 padding:12px;
 margin:8px;
 border-radius:8px;
 border:none;
}
#login button{
 width:85%;
 padding:12px;
 border:none;
 border-radius:8px;
 background:#ff2e63;
 color:white;
}

/* SEARCH */
.search{margin:10px;padding:10px;width:90%;border-radius:8px;border:none}

/* CARD */
.card{background:#1e1e1e;margin:10px;padding:15px;border-radius:10px}
.card img{width:100%;border-radius:10px}

/* BUTTON */
.btn{background:#ff2e63;padding:10px;border-radius:8px;margin-top:8px;text-align:center}

/* NAVBAR */
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.nav div{flex:1;text-align:center;padding:10px}

/* SIDEBAR */
#sidebar{
 position:fixed;
 left:-250px;
 top:0;
 width:250px;
 height:100%;
 background:#111;
 padding:15px;
 transition:0.3s;
 z-index:999;
}

/* VIDEO */
iframe{width:100%;height:200px;border:none;border-radius:10px}

/* HIDDEN */
.hidden{display:none}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
<h3>🔥 Menu</h3>
<p onclick="show('home')">🏠 Home</p>
<p onclick="showFav()">❤️ Favorit</p>
<p onclick="show('profile')">👤 Profile</p>
<p onclick="upgrade()">💎 Premium</p>
</div>

<button onclick="toggleMenu()" style="position:fixed;top:10px;left:10px;z-index:1000;">☰</button>

<!-- LOGIN -->
<div id="login">
<h2>🔥 Login HiroNime</h2>
<input id="u" placeholder="Email">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="header">🔥 HiroNime PRO</div>

<input class="search" placeholder="Cari anime..." onkeyup="searchAnime(this.value)">

<!-- HOME -->
<div id="home"></div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<h2 id="dTitle"></h2>

<iframe id="video" src=""></iframe>

<p id="dDesc"></p>
<div class="btn" onclick="back()">⬅️ Kembali</div>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h2>👤 Admin Hiro</h2>
<p id="status">Status: Free</p>
<div class="btn" onclick="upgrade()">Upgrade Premium</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="showFav()">❤️</div>
<div onclick="show('profile')">👤</div>
</div>

</div>

<script>

/* AUTO LOGIN */
if(localStorage.getItem("login")){
 document.getElementById("login").style.display="none";
 document.getElementById("app").classList.remove("hidden");
}

/* LOGIN */
function login(){
 localStorage.setItem("login",true);
 document.getElementById("login").style.display="none";
 document.getElementById("app").classList.remove("hidden");
}

/* SIDEBAR */
function toggleMenu(){
 let s = document.getElementById("sidebar");
 s.style.left = (s.style.left=="0px") ? "-250px" : "0px";
}

/* DETAIL + VIDEO */
function detail(t,d){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("detail").classList.remove("hidden");
 document.getElementById("dTitle").innerText=t;
 document.getElementById("dDesc").innerText=d;

 // VIDEO RANDOM (YT embed)
 document.getElementById("video").src =
 "https://www.youtube.com/embed/dQw4w9WgXcQ";
}

/* BACK */
function back(){
 document.getElementById("detail").classList.add("hidden");
 document.getElementById("home").classList.remove("hidden");
}

/* FAVORIT */
function fav(name){
 let f = JSON.parse(localStorage.getItem("fav")||"[]");
 f.push(name);
 localStorage.setItem("fav", JSON.stringify(f));
 alert("Ditambah ke favorit");
}

function showFav(){
 let f = JSON.parse(localStorage.getItem("fav")||"[]");
 alert("Favorit: "+f.join(", "));
}

/* NAV */
function show(page){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("profile").classList.add("hidden");
 document.getElementById("detail").classList.add("hidden");
 document.getElementById(page).classList.remove("hidden");
}

/* SEARCH */
function searchAnime(q){
 let cards = document.querySelectorAll(".card");
 cards.forEach(c=>{
  if(c.innerText.toLowerCase().includes(q.toLowerCase())){
    c.style.display="block";
  }else{
    c.style.display="none";
  }
 });
}

/* PREMIUM */
function upgrade(){
 localStorage.setItem("premium",true);
 document.getElementById("status").innerText="Status: Premium 😎";
 alert("Premium aktif!");
}

/* LOAD PREMIUM */
if(localStorage.getItem("premium")){
 document.getElementById("status").innerText="Status: Premium 😎";
}

/* AUTO ANIME */
let home = document.getElementById("home");

for(let i=1;i<=100;i++){
 let div = document.createElement("div");
 div.className="card";
 div.innerHTML = `
  <img src="https://picsum.photos/400/200?random=${i}">
  <h3 onclick="detail('Anime ${i}','Anime keren nomor ${i}')">Anime ${i}</h3>
  <div class="btn" onclick="fav('Anime ${i}')">❤️ Favorit</div>
 `;
 home.appendChild(div);
}
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDh0H4VFLMi7HZtBZ5-...",
  authDomain: "hironime.firebaseapp.com",
  projectId: "hironime",
  storageBucket: "hironime.appspot.com",
  messagingSenderId: "674307721619",
  appId: "1:674307721619:web:932a9f..."
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN EMAIL
window.login = function(){
 let email = document.getElementById("email").value;
 let pass = document.getElementById("pass").value;

 signInWithEmailAndPassword(auth, email, pass)
 .then(()=>{
  alert("Login berhasil 🔥");
 })
 .catch(e=>alert(e.message));
}

// LOGIN GOOGLE
window.loginGoogle = function(){
 const provider = new GoogleAuthProvider();

 signInWithPopup(auth, provider)
 .then(()=>{
  alert("Login Google berhasil 🔥");
 });
}

// AUTO LOGIN
onAuthStateChanged(auth, (user)=>{
 if(user){
  console.log("User login:", user.email);
 }
});

</script>
</script>

</body>
</html>
