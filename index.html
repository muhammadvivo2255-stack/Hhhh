<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ninemeid Hiro</title>

<style>
body{margin:0;background:#0d0d0d;color:white;font-family:sans-serif}
.header{padding:15px;font-size:22px;font-weight:bold}
.search{margin:10px;padding:10px;width:90%;border-radius:8px;border:none}

.card{
 background:#1e1e1e;
 margin:10px;
 border-radius:12px;
 overflow:hidden;
}

.card img{
 width:100%;
 height:180px;
 object-fit:cover;
}

.card-content{
 padding:10px;
}

.btn{
 background:#ff2e63;
 padding:8px;
 border-radius:8px;
 margin-top:8px;
 text-align:center;
}

.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#111;
}

.nav div{
 flex:1;
 text-align:center;
 padding:10px;
}

.hidden{display:none}

iframe{
 width:100%;
 height:200px;
 border:none;
}
</style>
</head>

<body>

<div class="header">🔥 Ninemeid Hiro</div>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="u" placeholder="Username (hiro)"><br><br>
<input type="password" placeholder="bebas"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<input class="search" placeholder="Search anime..." onkeyup="searchAnime(this.value)">

<div id="home">

<div class="card" data-name="rezero">
<img src="https://i.imgur.com/3ZQ3Z4Z.jpg">
<div class="card-content">
<h3 onclick="detail('Re:Zero','Anime sedih brutal','https://www.youtube.com/embed/ETWPtIfesyA')">Re:Zero</h3>
<div class="btn" onclick="fav('Re:Zero')">❤️ Favorit</div>
</div>
</div>

<div class="card" data-name="aot">
<img src="https://i.imgur.com/oYiTqum.jpg">
<div class="card-content">
<h3 onclick="detail('Attack on Titan','Anime perang','https://www.youtube.com/embed/MGRm4IzK1SQ')">Attack on Titan</h3>
<div class="btn" onclick="fav('AOT')">❤️ Favorit</div>
</div>
</div>

<div class="card" data-name="kimetsu">
<img src="https://i.imgur.com/tXK7bXy.jpg">
<div class="card-content">
<h3 onclick="detail('Demon Slayer','Anime keren','https://www.youtube.com/embed/VQGCKyvzIM4')">Demon Slayer</h3>
<div class="btn" onclick="fav('Kimetsu')">❤️ Favorit</div>
</div>
</div>

</div>

<!-- DETAIL -->
<div id="detail" class="hidden">
<h2 id="dTitle"></h2>
<p id="dDesc"></p>
<iframe id="video"></iframe>
<div class="btn" onclick="back()">⬅️ Kembali</div>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h2>👤 Admin Hiro</h2>
<p>Status: Premium 😎</p>
</div>

<!-- NAVBAR -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="showFav()">❤️</div>
<div onclick="show('profile')">👤</div>
</div>

</div>

<script>
function login(){
 var u=document.getElementById("u").value;
 if(u.toLowerCase()=="hiro"){
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.remove("hidden");
 }
}

function detail(t,d,v){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("detail").classList.remove("hidden");
 document.getElementById("dTitle").innerText=t;
 document.getElementById("dDesc").innerText=d;
 document.getElementById("video").src=v;
}

function back(){
 document.getElementById("detail").classList.add("hidden");
 document.getElementById("home").classList.remove("hidden");
 document.getElementById("video").src="";
}

function fav(name){
 var f=JSON.parse(localStorage.getItem("fav")||"[]");
 if(f.indexOf(name)==-1) f.push(name);
 localStorage.setItem("fav",JSON.stringify(f));
 alert("Favorit ditambah");
}

function show(page){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("profile").classList.add("hidden");
 document.getElementById("detail").classList.add("hidden");
 document.getElementById(page).classList.remove("hidden");
}

function showFav(){
 var f=JSON.parse(localStorage.getItem("fav")||"[]");
 alert("Favorit:\n"+f.join("\n"));
}

function searchAnime(q){
 var cards=document.querySelectorAll(".card");
 for(var i=0;i<cards.length;i++){
  if(cards[i].dataset.name.indexOf(q.toLowerCase())!=-1){
   cards[i].style.display="block";
  }else{
   cards[i].style.display="none";
  }
 }
}
</script>

</body>
  </html>
